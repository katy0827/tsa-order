<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSA 聚餐點餐表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--yellow:#F5C842;--yellow-light:#FFF8DC;--yellow-dark:#D4A017;--bg:#FAFAF7;--card:#FFFFFF;--text:#1A1A1A;--muted:#777;--border:#E8E4D9;--green:#2E7D4F;--green-bg:#EAF5EE;--red:#C0392B;--red-bg:#FDEDEC;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--yellow);padding:1.5rem 1.5rem 1.4rem;text-align:center;border-bottom:3px solid var(--yellow-dark);}
header h1{font-size:1.6rem;font-weight:700;color:#1A1A1A;}
header p{margin-top:0.3rem;font-size:0.85rem;color:#555;}
.header-bottom{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:0.8rem;flex-wrap:wrap;}
.budget-chip{background:#fff;border:2px solid var(--yellow-dark);border-radius:99px;padding:6px 20px;font-size:1.05rem;font-weight:700;color:var(--yellow-dark);}
.budget-note{font-size:0.75rem;color:#7A5500;background:rgba(255,255,255,0.5);border-radius:99px;padding:4px 10px;}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1.5px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;padding:12px 8px 10px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:0.72rem;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;transition:0.15s;}
.nav-btn.active{color:var(--yellow-dark);font-weight:700;}
.nav-btn .icon{font-size:1.3rem;}
.screen{display:none;padding-bottom:80px;}
.screen.active{display:block;}
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.people-btn{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;text-align:left;font-family:inherit;transition:0.15s;display:flex;align-items:center;gap:10px;width:100%;}
.people-btn:hover{border-color:var(--yellow-dark);background:var(--yellow-light);}
.p-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.p-name{font-size:0.85rem;font-weight:700;}
.p-status{font-size:0.72rem;color:var(--muted);margin-top:2px;}
.back-btn{background:none;border:none;cursor:pointer;font-family:inherit;font-size:0.85rem;color:var(--muted);padding:0 0 1rem;display:flex;align-items:center;gap:4px;}
.back-btn:hover{color:var(--text);}
.order-header{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:1rem;display:flex;align-items:center;gap:12px;}
.order-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.order-name{font-size:1.05rem;font-weight:700;}
.order-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;}
.card-label{font-size:0.82rem;font-weight:700;color:var(--yellow-dark);margin-bottom:10px;}
.order-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;margin-bottom:10px;}
.order-row select{font-family:inherit;font-size:0.85rem;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg);color:var(--text);cursor:pointer;width:100%;}
.order-row select:focus{outline:none;border-color:var(--yellow-dark);}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qty-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:0.15s;}
.qty-btn:hover{background:var(--yellow-light);border-color:var(--yellow-dark);}
.qty-val{font-size:0.9rem;font-weight:700;min-width:22px;text-align:center;}
.item-price{font-size:0.85rem;color:var(--muted);min-width:60px;text-align:right;}
.del-btn{width:30px;height:30px;border-radius:50%;border:none;background:none;cursor:pointer;color:#bbb;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:0.15s;}
.del-btn:hover{background:var(--red-bg);color:var(--red);}
.add-btn{margin-top:12px;background:none;border:1.5px dashed var(--border);border-radius:8px;padding:8px 14px;font-family:inherit;font-size:0.82rem;color:var(--muted);cursor:pointer;width:100%;transition:0.15s;}
.add-btn:hover{border-color:var(--yellow-dark);color:var(--yellow-dark);background:var(--yellow-light);}
.set-options{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;}
.set-btn{border:1.5px solid var(--border);border-radius:10px;padding:10px 8px;cursor:pointer;font-family:inherit;background:var(--bg);text-align:center;transition:0.15s;}
.set-btn:hover{border-color:var(--yellow-dark);background:var(--yellow-light);}
.set-btn.selected{border:2px solid var(--yellow-dark);background:var(--yellow-light);}
.set-btn .set-name{font-size:0.9rem;font-weight:700;}
.set-btn .set-price{font-size:0.82rem;color:var(--yellow-dark);font-weight:700;margin-top:2px;}
.set-btn .set-desc{font-size:0.7rem;color:var(--muted);margin-top:3px;line-height:1.4;}
.set-drink-wrap{margin-top:10px;}
.set-drink-wrap label{font-size:0.78rem;color:var(--muted);display:block;margin-bottom:4px;}
.set-drink-wrap select{font-family:inherit;font-size:0.85rem;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg);color:var(--text);cursor:pointer;width:100%;}
.set-drink-wrap select:focus{outline:none;border-color:var(--yellow-dark);}
.drink-extra{font-size:0.78rem;color:var(--red);margin-top:4px;display:none;}
.egg-toggle{display:flex;align-items:center;gap:10px;margin-top:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;background:var(--bg);transition:0.15s;width:100%;}
.egg-toggle:hover{border-color:var(--yellow-dark);background:var(--yellow-light);}
.egg-toggle.selected{border:2px solid var(--yellow-dark);background:var(--yellow-light);}
.egg-toggle input{accent-color:var(--yellow-dark);width:16px;height:16px;flex-shrink:0;}
.egg-label{font-size:0.85rem;font-weight:700;flex:1;text-align:left;}
.egg-price{font-size:0.82rem;color:var(--yellow-dark);font-weight:700;}
.note-wrap{margin-top:0;}
.note-label{font-size:0.78rem;color:var(--muted);margin-bottom:4px;}
.note-wrap textarea{width:100%;font-family:inherit;font-size:0.85rem;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg);color:var(--text);resize:vertical;min-height:60px;}
.note-wrap textarea:focus{outline:none;border-color:var(--yellow-dark);}
.subtotal-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:var(--card);border:1.5px solid var(--border);border-radius:14px;margin-bottom:10px;}
.subtotal-amount{font-size:1.2rem;font-weight:700;}
.remain{color:var(--green);font-size:0.78rem;margin-top:2px;}
.exceed{color:var(--red);font-size:0.78rem;margin-top:2px;}
.submit-btn{width:100%;padding:14px;background:var(--yellow);border:2px solid var(--yellow-dark);border-radius:12px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;transition:0.15s;color:#1A1A1A;}
.submit-btn:hover{background:var(--yellow-dark);color:#fff;}
.submit-btn:disabled{background:#ddd;border-color:#ccc;color:#999;cursor:not-allowed;}
.refresh-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 14px;font-family:inherit;font-size:0.82rem;color:var(--muted);cursor:pointer;margin-bottom:1rem;}
.refresh-btn:hover{border-color:var(--yellow-dark);color:var(--yellow-dark);}
.summary-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.stat-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.stat-num{font-size:1.3rem;font-weight:700;}
.stat-label{font-size:0.72rem;color:var(--muted);margin-top:2px;}
.order-entry{background:var(--card);border:1.5px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.order-entry-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;}
.order-entry-header:hover{background:var(--yellow-light);}
.entry-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.entry-name{font-size:0.9rem;font-weight:700;flex:1;}
.entry-total.over{color:var(--red);}
.entry-body{padding:0 16px 14px;border-top:1.5px solid var(--border);}
.entry-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:0.85rem;}
.entry-row:last-child{border-bottom:none;}
.entry-note{font-size:0.78rem;color:var(--muted);margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border);}
.badge-pending{background:#F0EFE8;color:#999;font-size:0.72rem;padding:2px 8px;border-radius:99px;}
.badge-done{background:var(--green-bg);color:var(--green);font-size:0.72rem;padding:2px 8px;border-radius:99px;}
.summary-section{background:var(--card);border:2px solid var(--yellow-dark);border-radius:14px;padding:16px 18px;margin-top:1.5rem;}
.summary-section h3{font-size:1rem;font-weight:700;margin-bottom:12px;color:var(--yellow-dark);}
.summary-item-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:0.88rem;}
.summary-item-row:last-child{border-bottom:none;}
.summary-item-qty{background:var(--yellow-light);color:var(--yellow-dark);font-weight:700;font-size:0.8rem;padding:2px 8px;border-radius:99px;min-width:32px;text-align:center;}
.summary-grand{display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:2px solid var(--yellow-dark);font-weight:700;font-size:1rem;}
.no-orders{text-align:center;padding:3rem;color:var(--muted);font-size:0.9rem;}
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:10px 24px;border-radius:99px;font-size:0.85rem;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <h1>🍽 TSA 聚餐點餐表</h1>
  <p>點選你的名字開始點餐</p>
  <div class="header-bottom">
    <span class="budget-chip">每人額度 NT$600</span>
    <span class="budget-note">超額請交給 Katy 💛</span>
  </div>
</header>

<div id="screen-home" class="screen active">
  <div style="max-width:600px;margin:0 auto;padding:1.5rem;">
    <h2 style="font-size:1rem;font-weight:700;margin-bottom:1rem;text-align:center;color:var(--muted);">請選擇你的名字</h2>
    <div class="people-grid" id="people-grid"></div>
  </div>
</div>

<div id="screen-order" class="screen">
  <div style="max-width:680px;margin:0 auto;padding:1.5rem;">
    <button class="back-btn" onclick="showScreen('home')">← 返回名單</button>
    <div class="order-header">
      <div class="order-avatar" id="order-avatar"></div>
      <div>
        <div class="order-name" id="order-name"></div>
        <div style="font-size:0.82rem;color:var(--muted);margin-top:2px;">每人額度 NT$600｜超額請交給 Katy</div>
      </div>
    </div>
    <div class="order-card">
      <div class="card-label">🍽 主餐</div>
      <div id="order-items"></div>
      <button class="add-btn" onclick="addItem()">＋ 新增品項</button>
    </div>
    <div class="order-card">
      <div class="card-label">🎁 套餐加購（選填）</div>
      <div class="set-options">
        <button class="set-btn selected" id="set-none" onclick="selectSet('none')">
          <div class="set-name">不加套餐</div><div class="set-price">+$0</div><div class="set-desc">單點</div>
        </button>
        <button class="set-btn" id="set-A" onclick="selectSet('A')">
          <div class="set-name">A 套餐</div><div class="set-price">+$98</div><div class="set-desc">湯（附麵包）<br>或 $130 飲品</div>
        </button>
        <button class="set-btn" id="set-B" onclick="selectSet('B')">
          <div class="set-name">B 套餐</div><div class="set-price">+$198</div><div class="set-desc">湯+沙拉<br>或 湯+$130飲品</div>
        </button>
        <button class="set-btn" id="set-C" onclick="selectSet('C')">
          <div class="set-name">C 套餐</div><div class="set-price">+$298</div><div class="set-desc">$360以下鬆餅<br>+ $130 飲品</div>
        </button>
      </div>
      <div class="set-drink-wrap" id="set-drink-wrap" style="display:none;">
        <label>🧋 套餐飲品（含 $130，超出補差額）</label>
        <select id="set-drink-select" onchange="updateTotal()">
          <option value="">— 選擇飲品 —</option>
        </select>
        <div class="drink-extra" id="drink-extra"></div>
      </div>
      <button class="egg-toggle" id="egg-toggle" onclick="toggleEgg()">
        <input type="checkbox" id="egg-check" onclick="event.stopPropagation()">
        <span class="egg-label">🥚 加購溫泉蛋</span>
        <span class="egg-price">+$30</span>
      </button>
    </div>
    <div class="order-card">
      <div class="note-wrap">
        <div class="note-label">📝 備註（過敏、特殊需求等）</div>
        <textarea id="order-note" placeholder="例如：不要香菜、對海鮮過敏..."></textarea>
      </div>
    </div>
    <div class="subtotal-bar">
      <div>
        <div style="font-size:0.85rem;color:var(--muted);">小計</div>
        <div id="budget-remain"></div>
      </div>
      <div class="subtotal-amount" id="subtotal-amount">NT$0</div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitOrder()">✅ 確認送出點餐</button>
  </div>
</div>

<div id="screen-orders" class="screen">
  <div style="max-width:680px;margin:0 auto;padding:1.5rem;">
    <h2>📋 所有訂單</h2>
    <button class="refresh-btn" onclick="loadOrders()">🔄 重新整理</button>
    <div class="summary-stats">
      <div class="stat-card"><div class="stat-num" id="stat-ordered">-</div><div class="stat-label">已點人數</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-pending">-</div><div class="stat-label">未點人數</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-total">-</div><div class="stat-label">預估總額</div></div>
    </div>
    <div id="orders-list"></div>
    <div id="summary-section"></div>
  </div>
</div>

<nav class="nav-bar">
  <button class="nav-btn active" id="nav-home" onclick="showScreen('home')"><span class="icon">👥</span>點餐名單</button>
  <button class="nav-btn" id="nav-orders" onclick="showScreen('orders')"><span class="icon">📋</span>查看訂單</button>
</nav>
<div class="toast" id="toast"></div>

  {name:"Gwen 陳冠孜",email:"gwenchen@tsagroup.com.tw"},
  {name:"Jacob 呂世評",email:"jacob@tsagroup.com.tw"},
  {name:"Jessica 李潔慧",email:"jessica@tsagroup.com.tw"},
  {name:"Jimmy 王鈞逸",email:"jimmywang@tsagroup.com.tw"},
  {name:"John 黃文傳",email:"johnhuang@tsagroup.com.tw"},
  {name:"Katy 林仕涵",email:"katy@tsagroup.com.tw"},
  {name:"Molly 何舒維",email:"mollyho@tsagroup.com.tw"},
  {name:"Penny 李品嫺",email:"pennyli@tsagroup.com.tw"},
  {name:"Sandy 鄒馨瑩",email:"sandy@tsagroup.com.tw"},
  {name:"Senou 歐倩妤",email:"senou@tsagroup.com.tw"},
  {name:"Stefanie 邱湘芬",email:"stefanie@tsagroup.com.tw"},
  {name:"Tiana 李亭儀",email:"tianali@tsagroup.com.tw"},
  {name:"Tim 徐唯庭",email:"timhsu@tsagroup.com.tw"},
  {name:"Will 吳政哲",email:"willwu@tsagroup.com.tw"},
  {name:"Zola 曾子柔",email:"zolatseng@tsagroup.com.tw"},
  {name:"Zong 宗",email:"marketing@tsagroup.com.tw"},
];
const COLORS=[{bg:"#FFF0CC",tc:"#8A6000"},{bg:"#E8F4FF",tc:"#1A5C8A"},{bg:"#F0FFF4",tc:"#1A6B3A"},{bg:"#FFF0F5",tc:"#8A1A4A"},{bg:"#F5F0FF",tc:"#5A1A8A"},{bg:"#FFF5F0",tc:"#8A3A1A"},{bg:"#F0FFF9",tc:"#1A6B5A"}];
let currentPerson=null,currentItems=[],expandedOrders=new Set(),allOrdersData=[];
let selectedSet='none',wantEgg=false;

function getInitials(n){return n.replace(/[a-z\s]/g,'').substring(0,2)||n.substring(0,2);}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  const nb=document.getElementById('nav-'+name);
  if(nb)nb.classList.add('active');
  if(name==='orders')loadOrders();
}

function buildSelect(sel){
  let h='<select><option value="">— 選擇品項 —</option>';
  for(const[cat,items]of Object.entries(MENU)){
    h+=`<optgroup label="${cat}">`;
    for(const item of items){h+=`<option value="${item.name}|||${item.price}"${item.name===sel?' selected':''}>${item.name}（NT$${item.price}）</option>`;}
    h+='</optgroup>';
  }
  return h+'</select>';
}

function buildDrinkSelect(){
  let h='<option value="">— 選擇飲品 —</option>';
  DRINK_CATS.forEach(cat=>{
    const items=MENU[cat];
    if(!items)return;
    h+=`<optgroup label="${cat}">`;
    items.forEach(i=>{h+=`<option value="${i.name}|||${i.price}">${i.name}（NT$${i.price}）</option>`;});
    h+='</optgroup>';
  });
  document.getElementById('set-drink-select').innerHTML=h;
}

function getDrinkExtra(){
  const sel=document.getElementById('set-drink-select');
  if(!sel||!sel.value)return 0;
  const price=parseInt(sel.value.split('|||')[1])||0;
  return Math.max(0,price-130);
}

function selectSet(s){
  selectedSet=s;
  document.querySelectorAll('.set-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('set-'+s).classList.add('selected');
  const needDrink=s!=='none';
  document.getElementById('set-drink-wrap').style.display=needDrink?'block':'none';
  if(needDrink)buildDrinkSelect();
  updateTotal();
}

function toggleEgg(){
  wantEgg=!wantEgg;
  document.getElementById('egg-check').checked=wantEgg;
  document.getElementById('egg-toggle').classList.toggle('selected',wantEgg);
  updateTotal();
}

function getTotal(){
  const main=currentItems.reduce((s,r)=>s+r.price*r.qty,0);
  const set=SET_PRICES[selectedSet]||0;
  const egg=wantEgg?30:0;
  const drinkExtra=selectedSet!=='none'?getDrinkExtra():0;
  return main+set+egg+drinkExtra;
}

function renderItems(){
  let h='';
  currentItems.forEach((row,i)=>{
    h+=`<div class="order-row"><div>${buildSelect(row.name)}</div><div style="display:flex;align-items:center;gap:6px"><div class="qty-ctrl"><button class="qty-btn" onclick="changeQty(${i},-1)">−</button><span class="qty-val">${row.qty}</span><button class="qty-btn" onclick="changeQty(${i},1)">+</button></div><span class="item-price">NT$${row.price*row.qty}</span></div><button class="del-btn" onclick="delItem(${i})">✕</button></div>`;
  });
  document.getElementById('order-items').innerHTML=h;
  document.querySelectorAll('#order-items select').forEach((sel,i)=>{
    sel.addEventListener('change',function(){
      if(this.value){const[n,p]=this.value.split('|||');currentItems[i].name=n;currentItems[i].price=parseInt(p);renderItems();}
    });
  });
  updateTotal();
}

function updateTotal(){
  const drinkExtra=selectedSet!=='none'?getDrinkExtra():0;
  const extraEl=document.getElementById('drink-extra');
  if(drinkExtra>0){extraEl.style.display='block';extraEl.textContent=`飲品超出 $130，需補差額 NT$${drinkExtra}`;}
  else{extraEl.style.display='none';}
  const total=getTotal(),diff=BUDGET-total;
  document.getElementById('subtotal-amount').textContent=`NT$${total}`;
  document.getElementById('subtotal-amount').style.color=total>BUDGET?'var(--red)':'var(--text)';
  const el=document.getElementById('budget-remain');
  if(total===0)el.innerHTML='';
  else if(diff>=0)el.innerHTML=`<span class="remain">剩餘額度 NT$${diff}</span>`;
  else el.innerHTML=`<span class="exceed">超出預算 NT$${Math.abs(diff)}，請交給 Katy</span>`;
  document.getElementById('submit-btn').disabled=currentItems.length===0||currentItems.some(r=>!r.name);
}

function addItem(){currentItems.push({name:'',price:0,qty:1});renderItems();}
function delItem(i){currentItems.splice(i,1);renderItems();}
function changeQty(i,d){currentItems[i].qty=Math.max(1,currentItems[i].qty+d);renderItems();}

function selectPerson(idx){
  currentPerson=PEOPLE[idx];currentItems=[];selectedSet='none';wantEgg=false;
  const c=COLORS[idx%COLORS.length];
  document.getElementById('order-avatar').textContent=getInitials(currentPerson.name);
  document.getElementById('order-avatar').style.background=c.bg;
  document.getElementById('order-avatar').style.color=c.tc;
  document.getElementById('order-name').textContent=currentPerson.name;
  document.getElementById('order-note').value='';
  document.getElementById('egg-check').checked=false;
  document.getElementById('egg-toggle').classList.remove('selected');
  document.getElementById('set-drink-wrap').style.display='none';
  document.getElementById('drink-extra').style.display='none';
  document.querySelectorAll('.set-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('set-none').classList.add('selected');
  showScreen('order');
  addItem();
}

async function submitOrder(){
  const btn=document.getElementById('submit-btn');
  const note=document.getElementById('order-note').value.trim();
  const validItems=currentItems.filter(r=>r.name);
  if(validItems.length===0)return;
  const allItems=[...validItems];
  if(selectedSet!=='none'){
    allItems.push({name:`${selectedSet}套餐`,qty:1,price:SET_PRICES[selectedSet]});
    const drinkSel=document.getElementById('set-drink-select');
    if(drinkSel&&drinkSel.value){
      const[dname,dprice]=drinkSel.value.split('|||');
      const extra=Math.max(0,parseInt(dprice)-130);
      allItems.push({name:`套餐飲品：${dname}`,qty:1,price:extra});
    }
  }
  if(wantEgg)allItems.push({name:'溫泉蛋',qty:1,price:30});
  btn.disabled=true;btn.textContent='送出中...';
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:currentPerson.name,email:currentPerson.email,items:allItems,note:note})});
    showToast(`✅ ${currentPerson.name} 點餐成功！`);
    setTimeout(()=>showScreen('home'),1500);
  }catch(e){
    showToast('❌ 送出失敗，請重試');
    btn.disabled=false;btn.textContent='✅ 確認送出點餐';
  }
}

async function loadOrders(){
  document.getElementById('orders-list').innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted);">載入中...</div>';
  document.getElementById('summary-section').innerHTML='';
  try{
    const res=await fetch(SCRIPT_URL+'?t='+Date.now());
    const data=await res.json();
    allOrdersData=data;renderOrders(data);
  }catch(e){
    document.getElementById('orders-list').innerHTML='<div class="no-orders">載入失敗，請點重新整理</div>';
  }
}

function renderOrders(data){
  const grouped={};
  data.forEach(row=>{
    const email=row['Email'];
    if(!grouped[email]){grouped[email]={name:row['姓名'],email,items:[],note:row['備註']||''};}
    grouped[email].items.push({name:row['品項'],qty:Number(row['數量']),price:Number(row['單價']),subtotal:Number(row['小計'])});
  });
  const orderedCount=Object.keys(grouped).length;
  const grandTotal=Object.values(grouped).reduce((s,p)=>s+p.items.reduce((ss,i)=>ss+i.subtotal,0),0);
  document.getElementById('stat-ordered').textContent=orderedCount;
  document.getElementById('stat-pending').textContent=PEOPLE.length-orderedCount;
  document.getElementById('stat-total').textContent=`$${grandTotal.toLocaleString()}`;
  if(orderedCount===0){
    document.getElementById('orders-list').innerHTML='<div class="no-orders">目前還沒有人點餐</div>';
    document.getElementById('summary-section').innerHTML='';return;
  }
  let h='';
  PEOPLE.forEach((p,i)=>{
    const g=grouped[p.email];
    const c=COLORS[i%COLORS.length];
    if(g){
      const total=g.items.reduce((s,it)=>s+it.subtotal,0);
      const isOver=total>BUDGET,isExp=expandedOrders.has(p.email);
      h+=`<div class="order-entry"><div class="order-entry-header" onclick="toggleOrder('${p.email}')"><div class="entry-avatar" style="background:${c.bg};color:${c.tc}">${getInitials(p.name)}</div><span class="entry-name">${p.name}</span><span class="badge-done">已點餐</span><span class="entry-total${isOver?' over':''}" style="margin-left:8px;font-size:0.85rem;font-weight:700">NT$${total}${isOver?' ▲':''}</span><span style="margin-left:6px;color:var(--muted);font-size:0.8rem">${isExp?'▲':'▼'}</span></div>`;
      if(isExp){h+=`<div class="entry-body">`;g.items.forEach(it=>{h+=`<div class="entry-row"><span>${it.name} ×${it.qty}</span><span>NT$${it.subtotal}</span></div>`;});if(g.note)h+=`<div class="entry-note">📝 ${g.note}</div>`;h+=`</div>`;}
      h+=`</div>`;
    }else{
      h+=`<div class="order-entry"><div class="order-entry-header" style="cursor:default"><div class="entry-avatar" style="background:${c.bg};color:${c.tc}">${getInitials(p.name)}</div><span class="entry-name">${p.name}</span><span class="badge-pending">未點餐</span></div></div>`;
    }
  });
  document.getElementById('orders-list').innerHTML=h;
  const itemMap={};
  data.forEach(row=>{
    const name=row['品項'],qty=Number(row['數量']),price=Number(row['單價']);
    if(!itemMap[name])itemMap[name]={qty:0,price};
    itemMap[name].qty+=qty;
  });
  const sorted=Object.entries(itemMap).sort((a,b)=>b[1].qty-a[1].qty);
  let sh=`<div class="summary-section"><h3>🧾 餐點彙總（供餐廳參考）</h3>`;
  sorted.forEach(([name,info])=>{sh+=`<div class="summary-item-row"><span>${name}</span><div style="display:flex;align-items:center;gap:8px"><span class="summary-item-qty">×${info.qty}</span><span style="font-size:0.85rem;color:var(--muted)">NT$${info.price*info.qty}</span></div></div>`;});
  sh+=`<div class="summary-grand"><span>合計</span><span>NT$${grandTotal.toLocaleString()}</span></div></div>`;
  document.getElementById('summary-section').innerHTML=sh;
}

function toggleOrder(email){
  if(expandedOrders.has(email))expandedOrders.delete(email);
  else expandedOrders.add(email);
  renderOrders(allOrdersData);
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function renderPeople(){
  let h='';
  PEOPLE.forEach((p,i)=>{
    const c=COLORS[i%COLORS.length];
    h+=`<button class="people-btn" onclick="selectPerson(${i})"><div class="p-avatar" style="background:${c.bg};color:${c.tc}">${getInitials(p.name)}</div><div><div class="p-name">${p.name}</div><div class="p-status">點我點餐</div></div></button>`;
  });
  document.getElementById('people-grid').innerHTML=h;
}
renderPeople();
</script>
